<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NestQuest</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center;">

    <div class="glass-card" style="width: 100%; max-width: 450px;">
        
        <h1 style="text-align: center; color: var(--neon-pink); font-size: 2.8rem; margin-bottom: 5px; text-shadow: 0 0 20px rgba(255, 42, 133, 0.6);">
            🏠 <span class="nav-brand-text">NestQuest</span>
        </h1>
        
        <p style="text-align: center; margin-bottom: 2.5rem; font-weight: bold; color: var(--text-main);">
            Find your tribe.
        </p>

        <button type="button" id="googleLogin" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Sign up with Google
        </button>

        <div style="text-align: center; margin: 2rem 0; color: rgba(255,255,255,0.6);">— OR —</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address (@gmail.com required)</label>
                <input type="email" id="emailInput" required placeholder="name@gmail.com">
            </div>

            <div class="form-group" style="margin-top: 1rem;">
                <label>Password (8 chars, 1 num, 1 upper, 1 symbol)</label>
                <input type="password" id="pwdInput" required placeholder="••••••••">
                
                <div class="pwd-meter-container">
                    <div id="pwdMeter" class="pwd-meter"></div>
                </div>
                <div id="pwdText" class="pwd-text"></div>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 2.5rem;">Log In / Sign Up</button>
        </form>
        
    </div>

    <div id="customAlertModal" class="modal-overlay" style="display: none;">
        <div class="glass-card" style="text-align: center; width: 90%; max-width: 400px;">
            <h2 style="color: var(--neon-pink); margin-bottom: 1rem;">Hold up! ✋</h2>
            <p id="customAlertMsg" style="line-height: 1.6; font-size: 1.1rem;">Error message goes here</p>
            <button class="btn-primary" onclick="closeCustomAlert()" style="margin-top: 1.5rem;">Got it!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
